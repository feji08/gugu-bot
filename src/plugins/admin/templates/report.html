{% extends "base.html" %}
{% block title %}月报生成{% endblock %}
{% block content %}
<div class="card">
  <h2>月度报告</h2>
  <form method="get" action="/admin/report/download">
    <div class="form-group">
      <label>开始日期</label>
      <input type="date" name="start_date" value="{{ default_start }}">
    </div>
    <div class="form-group">
      <label>结束日期</label>
      <input type="date" name="end_date" value="{{ default_end }}">
    </div>
    <button type="submit" class="btn btn-success">生成并下载 XLSX</button>
  </form>
</div>
{% endblock %}
